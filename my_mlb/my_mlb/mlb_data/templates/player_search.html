<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MLB Data - Player Search</title>
        <link rel="stylesheet" href="{% static 'mlb_data/css/style.css' %}">
    </head>
    <body>
        <header class="site-header">
            <span class="site-title">MLB Data</span>
        </header>
        <div class="container">
            <h1>Player Search</h1>
            <form class="search-form" action="{% url 'player_search_results' %}" method="post">
                <input type="text" name="q_name" placeholder="Player Name">
                <input type="submit" value="Search">
            </form>
            <div class="nav-links">
                <a href="{% url 'mlb_data' %}">&#8592; Back to Home</a>
            </div>
        </div>
    </body>
</html>
