<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MLB Data - Team Search Results</title>
        <link rel="stylesheet" href="{% static 'mlb_data/css/style.css' %}">
    </head>
    <body>
        <h1>MLB - Team Search Results</h1>
        <p>Search results for "{{ q_name }}"</p>
        <table border="1">
            <tr>
                <th>Team ID</th>
                <th>Name</th>
                <th>League</th>
                <th>Year Founded</th>
                <th>Latest Year</th>
            </tr>
            {% for team in teams %}
                <tr>
                    <td>{{ team.id }}</td>
                    <td><a href="{% url 'team_details' team.id %}">{{ team.name }}</a></td>
                    <td>{{ team.league }}</td>
                    <td>{{ team.yearFounded }}</td>
                    <td>{{ team.yearLast }}</td>
                </tr>
            {% endfor %}
        </table>
        <br/>
        <a href="{% url 'team_search' %}">Back to Team Search</a> <br/>
        <a href="{% url 'mlb_data' %}">Back to Home</a>
    </body>
</html>
